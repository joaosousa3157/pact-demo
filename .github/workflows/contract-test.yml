name: Contract Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-pact:
    runs-on: ubuntu-latest
    outputs:
      pact-path: pacts/FrontendApp-UserService.json
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Consumer Tests
        run: npm run test:consumer

      - name: Ensure Pact File Exists
        run: test -f pacts/FrontendApp-UserService.json

      - name: Upload Pact Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pacts/

  verify-provider:
    runs-on: ubuntu-latest
    needs: generate-pact
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Pact Artifact
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: pacts/

      - name: Run Provider Verification
        run: npm run test:provider